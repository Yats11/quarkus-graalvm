<svg viewBox="0 0 900 450" xmlns="http://www.w3.org/2000/svg"
     font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">

  <!-- ── Card ─────────────────────────────────────────────────────────── -->
  <rect width="900" height="450" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- ── Header strip ──────────────────────────────────────────────────── -->
  <rect width="900" height="62" rx="12" fill="#f8fafc"/>
  <rect y="50" width="900" height="12" fill="#f8fafc"/>

  <text x="24" y="29" font-size="16" font-weight="700" fill="#0f172a">&#x26A1; Java Runtime Benchmark</text>
  <text x="24" y="49" font-size="11.5" fill="#64748b">Quarkus Native · Quarkus JVM · Spring Boot JVM — same API, same logic, measured head-to-head</text>

  <!-- Legend -->
  <rect x="514" y="17" width="11" height="11" rx="2" fill="#94a3b8"/>
  <text x="531" y="27" font-size="11" fill="#64748b">Spring Boot JVM</text>

  <rect x="646" y="17" width="11" height="11" rx="2" fill="#f97316"/>
  <text x="663" y="27" font-size="11" fill="#64748b">Quarkus JVM</text>

  <rect x="755" y="17" width="11" height="11" rx="2" fill="#10b981"/>
  <text x="772" y="27" font-size="11" fill="#64748b">Quarkus Native</text>

  <!-- ── SECTION 1 · STARTUP TIME ─────────────────────────────────────── -->
  <text x="24" y="87" font-size="10.5" font-weight="700" fill="#94a3b8" letter-spacing="0.8">STARTUP TIME</text>
  <text x="24" y="101" font-size="10.5" fill="#cbd5e1">milliseconds · lower is better</text>

  <!-- Spring Boot: 500 px = 2800 ms -->
  <text x="222" y="122" font-size="11.5" fill="#64748b" text-anchor="end">Spring Boot JVM</text>
  <rect x="226" y="108" width="500" height="22" rx="3" fill="#94a3b8"/>
  <text x="734" y="122" font-size="12" font-weight="600" fill="#475569">2,800 ms</text>

  <!-- Quarkus JVM: 205 px = 1150 ms -->
  <text x="222" y="147" font-size="11.5" fill="#64748b" text-anchor="end">Quarkus JVM</text>
  <rect x="226" y="133" width="205" height="22" rx="3" fill="#f97316"/>
  <text x="438" y="147" font-size="12" font-weight="600" fill="#c2410c">1,150 ms</text>

  <!-- Quarkus Native: 14 px = 49 ms -->
  <text x="222" y="172" font-size="11.5" fill="#64748b" text-anchor="end">Quarkus Native</text>
  <rect x="226" y="158" width="14" height="22" rx="3" fill="#10b981"/>
  <text x="248" y="172" font-size="12" font-weight="700" fill="#065f46">49 ms &#x2605; 57&#xD7; faster</text>

  <!-- separator -->
  <line x1="24" y1="192" x2="876" y2="192" stroke="#f1f5f9" stroke-width="1.5"/>

  <!-- ── SECTION 2 · MEMORY USAGE ─────────────────────────────────────── -->
  <text x="24" y="212" font-size="10.5" font-weight="700" fill="#94a3b8" letter-spacing="0.8">MEMORY USAGE (RSS)</text>
  <text x="24" y="226" font-size="10.5" fill="#cbd5e1">megabytes · lower is better</text>

  <!-- Spring Boot: 500 px = 350 MB -->
  <text x="222" y="247" font-size="11.5" fill="#64748b" text-anchor="end">Spring Boot JVM</text>
  <rect x="226" y="233" width="500" height="22" rx="3" fill="#94a3b8"/>
  <text x="734" y="247" font-size="12" font-weight="600" fill="#475569">350 MB</text>

  <!-- Quarkus JVM: 396 px = 277 MB -->
  <text x="222" y="272" font-size="11.5" fill="#64748b" text-anchor="end">Quarkus JVM</text>
  <rect x="226" y="258" width="396" height="22" rx="3" fill="#f97316"/>
  <text x="630" y="272" font-size="12" font-weight="600" fill="#c2410c">277 MB</text>

  <!-- Quarkus Native: 100 px = 70 MB -->
  <text x="222" y="297" font-size="11.5" fill="#64748b" text-anchor="end">Quarkus Native</text>
  <rect x="226" y="283" width="100" height="22" rx="3" fill="#10b981"/>
  <text x="334" y="297" font-size="12" font-weight="700" fill="#065f46">70 MB &#x2605; 80% less</text>

  <!-- separator -->
  <line x1="24" y1="317" x2="876" y2="317" stroke="#f1f5f9" stroke-width="1.5"/>

  <!-- ── SECTION 3 · DOCKER IMAGE SIZE ────────────────────────────────── -->
  <text x="24" y="337" font-size="10.5" font-weight="700" fill="#94a3b8" letter-spacing="0.8">DOCKER IMAGE SIZE</text>
  <text x="24" y="351" font-size="10.5" fill="#cbd5e1">megabytes · lower is better</text>

  <!-- Spring Boot: 500 px = 250 MB -->
  <text x="222" y="372" font-size="11.5" fill="#64748b" text-anchor="end">Spring Boot JVM</text>
  <rect x="226" y="358" width="500" height="22" rx="3" fill="#94a3b8"/>
  <text x="734" y="372" font-size="12" font-weight="600" fill="#475569">250 MB</text>

  <!-- Quarkus JVM: 400 px = 200 MB -->
  <text x="222" y="397" font-size="11.5" fill="#64748b" text-anchor="end">Quarkus JVM</text>
  <rect x="226" y="383" width="400" height="22" rx="3" fill="#f97316"/>
  <text x="634" y="397" font-size="12" font-weight="600" fill="#c2410c">200 MB</text>

  <!-- Quarkus Native: 140 px = 70 MB -->
  <text x="222" y="422" font-size="11.5" fill="#64748b" text-anchor="end">Quarkus Native</text>
  <rect x="226" y="408" width="140" height="22" rx="3" fill="#10b981"/>
  <text x="374" y="422" font-size="12" font-weight="700" fill="#065f46">70 MB &#x2605; 72% smaller</text>

  <!-- ── Footer ─────────────────────────────────────────────────────────── -->
  <line x1="24" y1="440" x2="876" y2="440" stroke="#e2e8f0" stroke-width="1"/>
  <text x="24" y="447" font-size="10" fill="#94a3b8">Run </text>
  <text x="46" y="447" font-size="10" font-weight="600" fill="#64748b">./benchmark.sh</text>
  <text x="137" y="447" font-size="10" fill="#94a3b8"> to reproduce on your machine · Quarkus 3.17.7 · Spring Boot 3.4.3 · Java 21 · Gradle 8.14</text>

</svg>
